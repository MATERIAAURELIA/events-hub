<script>
// Config-driven — edit site-config.json to change everything
let SITE={}, EVENT_TYPES={}, VENUES={}, EVENTS=[], RESOURCES=[], TOP_LINKS=[], SOCIAL_LINKS=[], FILTER_ORDER=[], DESIGN={};

async function loadConfig(){
  try {
    const res = await fetch('site-config.json?v='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const cfg = await res.json();
    SITE = cfg.site || {};
    EVENT_TYPES = cfg.eventTypes || {};
    VENUES = cfg.venues || {};
    EVENTS = (cfg.events || []).filter(e => !e.archived).map(e=>({...e, vis:'public'}));
    RESOURCES = cfg.resources || [];
    TOP_LINKS = cfg.topLinks || [];
    SOCIAL_LINKS = cfg.socialLinks || [];
    FILTER_ORDER = cfg.filterOrder || [];
    DESIGN = cfg.design || {};
    console.log('Config loaded:',EVENTS.length,'events');
    // Apply design from config first, then localStorage overrides
    const savedSettings = localStorage.getItem(SETTINGS_KEY);
    if (savedSettings) {
      try { applySettings(JSON.parse(savedSettings)); } catch(e){}
    } else if (Object.keys(DESIGN).length) {
      applySettings(DESIGN);
    }
    applySiteConfig();
  } catch(e){ console.error('Config load failed',e); alert('Config load error: '+e.message); }
}

const SOCIAL_ICONS = {
  instagram: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>',
  facebook: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
  music: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>',
  mail: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
};

function applySiteConfig(){
  // Header
  document.querySelector('.header h1').textContent = SITE.name || '';
  document.querySelector('.header .bio').innerHTML = SITE.bio || '';
  const av = document.querySelector('.avatar');
  if(SITE.logo) av.innerHTML = `<img src="${SITE.logo}" alt="Logo">`;
  else if(SITE.logoEmoji) av.innerHTML = SITE.logoEmoji;
  // Check localStorage override
  const savedLogo = localStorage.getItem('eh-logo');
  if(savedLogo) av.innerHTML = `<img src="${savedLogo}" alt="Logo">`;

  // Top links
  const topEl = document.getElementById('top-links');
  topEl.innerHTML = TOP_LINKS.map(l => {
    const thumb = l.img ? `<img src="${l.img}" alt="" loading="lazy">` : `<span class="emoji">${l.emoji||'🔗'}</span>`;
    return `<a class="link-btn" href="${l.url}" target="_blank">
      <div class="btn-thumb">${thumb}</div>
      <div class="btn-text"><div class="event-title">${l.title}</div></div>
    </a>`;
  }).join('');

  // Resources
  const resEl = document.getElementById('resources-list');
  resEl.innerHTML = RESOURCES.map(r => {
    const thumb = r.img ? `<img src="${r.img}" alt="" loading="lazy" style="border-radius:4px">` : `<span class="emoji">${r.emoji||'🔗'}</span>`;
    return `<a class="link-btn" href="${r.url}" target="_blank">
      <div class="btn-thumb">${thumb}</div>
      <div class="btn-text"><div class="event-title">${r.title}</div></div>
    </a>`;
  }).join('');

  // Social
  const socEl = document.getElementById('social-links');
  socEl.innerHTML = SOCIAL_LINKS.map(s =>
    `<a class="social-icon" href="${s.url}" target="_blank" title="${s.name}">${SOCIAL_ICONS[s.icon]||s.icon}</a>`
  ).join('');
}

const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function toThumb(src){if(!src)return src;const dir=src.substring(0,src.lastIndexOf('/')+1);const name=src.substring(src.lastIndexOf('/')+1);const base=name.substring(0,name.lastIndexOf('.'));return dir+'thumbs/'+base+'.jpg';}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FMONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fDay=d=>{const x=new Date(d+'T00:00:00');return`${DAYS[x.getDay()]} ${MONTHS[x.getMonth()]} ${x.getDate()}`};
const fTime=t=>{const[h,m]=t.split(':').map(Number);return`${h%12||12}:${m.toString().padStart(2,'0')}${h>=12?'pm':'am'}`};

let activeFilter='all', activeSort='date', showVenue=true;

function buildFilters(){
  const el=document.getElementById('filters');
  el.innerHTML='<button class="filter-pill active" data-filter="all">All</button>'+
    FILTER_ORDER.map(t=>`<button class="filter-pill" data-filter="${t}">${EVENT_TYPES[t].name}</button>`).join('');
  el.querySelectorAll('.filter-pill').forEach(b=>b.onclick=()=>{
    el.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); activeFilter=b.dataset.filter; renderList();
  });
}

function getEvents(){
  let e=EVENTS.filter(e=>e.vis==='public');
  const today=new Date().toISOString().slice(0,10);
  e=e.filter(x=>x.date>=today);
  if(activeFilter!=='all')e=e.filter(x=>(EVENT_TYPES[x.type]?.filterAs||x.type)===activeFilter);
  if(activeSort==='date') e.sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  else if(activeSort==='price') e.sort((a,b)=>a.price-b.price);
  else if(activeSort==='location') e.sort((a,b)=>{
    const va=(a.venueOverride||VENUES[a.venue]?.name||'').toLowerCase();
    const vb=(b.venueOverride||VENUES[b.venue]?.name||'').toLowerCase();
    return va.localeCompare(vb)||a.date.localeCompare(b.date);
  });
  return e;
}

function renderList(){
  const el=document.getElementById('view-list');
  const showThumb=document.getElementById('s-show-thumb').checked;
  const showEmoji=document.getElementById('s-show-emoji').checked;
  const showBar=document.getElementById('s-show-bar').checked;
  
  el.innerHTML=getEvents().map(ev=>{
    const type=EVENT_TYPES[ev.type]||{name:'Event',color:'#888',icon:'🔔',img:''};
    const venue=VENUES[ev.venue]||{name:'',area:''};
    const vn=ev.venueOverride||venue.name;
    const spots=ev.spots?`<div class="spots-badge">${ev.spots} spot${ev.spots>1?'s':''}!</div>`:'';
    const thumbClass=showThumb?'':'hidden';
    const barClass=showBar?'':'hidden';
    const imgSrc=ev.img||type.img;
    const cropPos=ev.imgCrop||'center center';
    const thumbSrc=imgSrc?toThumb(imgSrc):null;
    const thumbContent=thumbSrc?`<img src="${thumbSrc}" alt="" loading="lazy" style="object-position:${cropPos}">`
      :`<span class="emoji">${type.icon}</span>`;
    
    const dateObj=new Date(ev.date+'T00:00:00');
    const dayName=DAYS[dateObj.getDay()];
    const monthDay=MONTHS[dateObj.getMonth()]+' '+dateObj.getDate();
    
    const isMobile=window.innerWidth<500;
    const venueShort=venue.name||vn.split('-')[0].trim();
    const venueDisplay=isMobile?venueShort:vn+(venue.area&&!ev.venueOverride?' - '+venue.area:'');
    return`<div class="link-btn" onclick="showPopup('${ev.id}')">
      ${spots}
      <div class="type-bar ${barClass}" style="background:${type.color}"></div>
      <div class="btn-thumb ${thumbClass}">${thumbContent}</div>
      <div class="btn-inner">
        <div class="event-date-col">
          <div class="ev-day">${dayName}</div>
          <div class="ev-date">${monthDay}</div>
          <div class="ev-time">${fTime(ev.time)}</div>
          <div class="ev-price">$${ev.price}</div>
        </div>
        <div class="event-date-divider"></div>
        <div class="event-info-col">
          <div class="event-title">${ev.title}</div>
          ${showVenue?`<div class="event-venue">📍 ${venueDisplay}</div>`:''}
        </div>
      </div>
      <button class="btn-share" onclick="event.stopPropagation();shareEv('${ev.title}','${ev.date}','${ev.booking}')" title="Share"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
    </div>`;
  }).join('');
}

function showPopup(id){
  const ev=EVENTS.find(e=>e.id===id); if(!ev)return;
  const type=EVENT_TYPES[ev.type], venue=VENUES[ev.venue]||{name:''};
  const vn=ev.venueOverride||venue.name;
  document.getElementById('popup-content').innerHTML=`
    <div class="p-title">${ev.title}</div>
    <div class="p-meta">📅 ${fDay(ev.date)} · ${fTime(ev.time)}-${fTime(ev.endTime)}<br>📍 ${vn}${!ev.venueOverride&&venue.area?' - '+venue.area:''}<br>🎟 $${ev.price}${ev.spots?'<br>🔥 '+ev.spots+' spot'+(ev.spots>1?'s':'')+' left!':''}</div>
    <div class="p-desc">${ev.desc||''}</div>
    ${ev.booking
      ? `<a class="btn-book" href="${ev.booking}" onclick="trackClick('${ev.id}','${ev.title.replace(/'/g,"\\'")}','${ev.booking}')">Book Now →</a>`
      : ev.contactEmail
        ? `<a class="btn-book" href="mailto:${ev.contactEmail}">Email to Register →</a>`
        : ev.contactPhone
          ? `<a class="btn-book" href="tel:${ev.contactPhone}">Call to Register →</a>`
          : ''
    }
    <button class="btn-share-popup" onclick="shareEv('${ev.title}','${ev.date}','${ev.booking}')">Share Event</button>`;
  const pop=document.getElementById('popup');
  pop.classList.add('show');
  document.getElementById('overlay').classList.add('show');
  // Scroll page to top so fixed popup is visible on mobile
  window.scrollTo(0,0);
}
function changeLogo(input){if(!input.files[0])return;const r=new FileReader();r.onload=e=>{const av=document.querySelector('.avatar');av.innerHTML=`<img src="${e.target.result}" alt="Logo">`;SyncStore.set('eh-logo',{data:e.target.result});localStorage.setItem('eh-logo',e.target.result);};r.readAsDataURL(input.files[0]);}
function copyPageLink(){navigator.clipboard.writeText(window.location.href);showToast('Link copied!');}
function sharePage(){const u=window.location.href;if(navigator.share)navigator.share({title:'Earth Harmony Sound & Wellness',url:u});else{navigator.clipboard.writeText(u);showToast('Link copied!');}}
function shareEv(t,d,u){const x=`${t} — ${fDay(d)}\n${u}`;if(navigator.share)navigator.share({title:t,text:x,url:u});else{navigator.clipboard.writeText(x);showToast('Link copied!');}}
function showToast(msg){const t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:'#333',color:'#fff',padding:'8px 20px',borderRadius:'20px',fontSize:'0.78rem',fontFamily:'Inter,sans-serif',fontWeight:'600',zIndex:'999',opacity:'0',transition:'opacity 0.3s'});document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},1800);}
document.getElementById('overlay').onclick=()=>{document.getElementById('popup').classList.remove('show');document.getElementById('overlay').classList.remove('show');};

// Calendar
let calM=new Date().getMonth(),calY=new Date().getFullYear();
function renderCal(){
  const g=document.getElementById('cal-grid');
  document.getElementById('cal-title').textContent=`${FMONTHS[calM]} ${calY}`;
  const f=new Date(calY,calM,1).getDay(),ds=new Date(calY,calM+1,0).getDate(),ts=new Date().toISOString().slice(0,10),p=new Date(calY,calM,0).getDate();
  let h=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  for(let i=f-1;i>=0;i--)h+=`<div class="cal-day other-month">${p-i}</div>`;
  for(let d=1;d<=ds;d++){
    const s=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=EVENTS.filter(x=>x.date===s&&x.vis==='public');
    const dots=e.map(x=>`<div class="cal-dot" style="background:${EVENT_TYPES[x.type]?.color||'#888'}"></div>`).join('');
    h+=`<div class="cal-day ${s===ts?'today':''} ${e.length?'has-event':''}" ${e.length?`onclick="showDayPopup('${s}')"`:''}>
      ${d}<div class="cal-dots">${dots}</div></div>`;
  }
  const r=7-(f+ds)%7;if(r<7)for(let i=1;i<=r;i++)h+=`<div class="cal-day other-month">${i}</div>`;
  g.innerHTML=h;
}
function showDayPopup(ds){
  const de=EVENTS.filter(e=>e.date===ds&&e.vis==='public');
  document.getElementById('popup-content').innerHTML=`<div style="font-weight:700;margin-bottom:12px">${fDay(ds)}</div>`+
    de.map(e=>{const t=EVENT_TYPES[e.type],v=VENUES[e.venue]||{name:''};
      return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee">
        <div style="font-size:0.62rem;color:${t.color};font-weight:700;text-transform:uppercase">${t.icon} ${t.name}</div>
        <div style="font-weight:600;margin:4px 0">${e.title}</div>
        <div style="font-size:0.72rem;color:#666">${fTime(e.time)}-${fTime(e.endTime)} · ${e.venueOverride||v.name} · $${e.price}</div>
        <a href="${e.booking}" target="_blank" class="btn-book" style="display:inline-block;padding:8px 20px;font-size:0.72rem;margin-top:8px;border-radius:10px">Book</a>
      </div>`;}).join('');
  const pop=document.getElementById('popup');
  pop.classList.add('show');
  document.getElementById('overlay').classList.add('show');
  window.scrollTo(0,0);
}

  const el=document.getElementById(id);
  el.oninput=()=>{r.style.setProperty(prop,el.value+unit);if(valId)document.getElementById(valId).textContent=el.value+unit;renderList();};
}
function bindSelect(id,prop){
  document.getElementById(id).onchange=e=>{r.style.setProperty(prop,e.target.value);renderList();};
}
function bindColor(id,prop){
  document.getElementById(id).oninput=e=>{r.style.setProperty(prop,e.target.value);};
}
function bindCheck(id,fn){
  document.getElementById(id).onchange=()=>{fn();renderList();};
}

// ============ SAVE / LOAD SETTINGS ============
const SETTINGS_KEY = 'eh-events-settings';

function gatherSettings() {
  return {
    bodyFont: document.getElementById('s-body-font').value,
    headFont: document.getElementById('s-heading-font').value,
    labelSize: document.getElementById('s-label-size').value,
    btnSize: document.getElementById('s-btn-size').value,
    headSize: document.getElementById('s-head-size').value,
    radius: document.getElementById('s-radius').value,
    padV: document.getElementById('s-pad-v').value,
    gap: document.getElementById('s-gap').value,
    thumbSize: document.getElementById('s-thumb').value,
    thumbR: document.getElementById('s-thumb-r').value,
    bgColor: document.getElementById('s-bg-color').value,
    btnColor: document.getElementById('s-btn-color').value,
    textColor: document.getElementById('s-text-color').value,
    showThumb: document.getElementById('s-show-thumb').checked,
    showEmoji: document.getElementById('s-show-emoji').checked,
    showBar: document.getElementById('s-show-bar').checked,
    showVenue: document.getElementById('s-show-venue').checked,
    centerText: document.getElementById('s-center-text').checked,
  };
}

function applySettings(s) {
  if (!s) return;
  const d = DESIGN || {}; // config defaults
  document.getElementById('s-body-font').value = s.bodyFont || d.bodyFont || "'Inter', sans-serif";
  document.getElementById('s-heading-font').value = s.headFont || d.headFont || "'Inter', sans-serif";
  document.getElementById('s-label-size').value = s.labelSize || d.labelSize || 1.05;
  document.getElementById('s-btn-size').value = s.btnSize || d.btnSize || 0.92;
  document.getElementById('s-head-size').value = s.headSize || d.headSize || 1.4;
  document.getElementById('s-radius').value = s.radius != null ? s.radius : (d.radius != null ? d.radius : 28);
  document.getElementById('s-pad-v').value = s.padV || d.padV || 10;
  document.getElementById('s-gap').value = s.gap || d.gap || 10;
  document.getElementById('s-thumb').value = s.thumbSize || d.thumbSize || 52;
  document.getElementById('s-thumb-r').value = s.thumbR != null ? s.thumbR : (d.thumbR != null ? d.thumbR : 8);
  document.getElementById('s-bg-color').value = s.bgColor || d.bgColor || '#D4951A';
  document.getElementById('s-btn-color').value = s.btnColor || d.btnColor || '#ffffff';
  document.getElementById('s-text-color').value = s.textColor || d.textColor || '#000000';
  document.getElementById('s-show-thumb').checked = s.showThumb !== false;
  document.getElementById('s-show-emoji').checked = s.showEmoji || false;
  document.getElementById('s-show-bar').checked = s.showBar || false;
  document.getElementById('s-show-venue').checked = s.showVenue !== false;
  document.getElementById('s-center-text').checked = s.centerText !== false;

  // Apply CSS vars
  const bf = s.bodyFont || d.bodyFont || "'Inter', sans-serif";
  const hf = s.headFont || d.headFont || "'Inter', sans-serif";
  const ls = s.labelSize || d.labelSize || 1.05;
  const bs = s.btnSize || d.btnSize || 0.92;
  const hs = s.headSize || d.headSize || 1.4;
  const rd = s.radius != null ? s.radius : (d.radius != null ? d.radius : 28);
  const pv = s.padV || d.padV || 10;
  const gp = s.gap || d.gap || 10;
  const ts = s.thumbSize || d.thumbSize || 52;
  const tr = s.thumbR != null ? s.thumbR : (d.thumbR != null ? d.thumbR : 8);
  const bg = s.bgColor || d.bgColor || '#D4951A';
  const bc = s.btnColor || d.btnColor || '#ffffff';
  const tc = s.textColor || d.textColor || '#000000';

  r.style.setProperty('--body-font', bf);
  r.style.setProperty('--heading-font', hf);
  r.style.setProperty('--section-label-size', ls+'rem');
  r.style.setProperty('--btn-font-size', bs+'rem');
  r.style.setProperty('--heading-size', hs+'rem');
  r.style.setProperty('--bio-size', (s.bioSize || d.bioSize || 0.95)+'rem');
  r.style.setProperty('--btn-radius', rd+'px');
  r.style.setProperty('--btn-padding-v', pv+'px');
  r.style.setProperty('--btn-gap', gp+'px');
  r.style.setProperty('--thumb-size', ts+'px');
  r.style.setProperty('--thumb-radius', tr+'px');
  r.style.setProperty('--bg', bg);
  r.style.setProperty('--btn-bg', bc);
  r.style.setProperty('--btn-text', tc);
  r.style.setProperty('--text-align', s.centerText !== false ? 'center' : 'left');

  showVenue = s.showVenue !== false;

  // Update val labels
  document.getElementById('v-label-size').textContent = ls+'rem';
  document.getElementById('v-btn-size').textContent = bs+'rem';
  document.getElementById('v-head-size').textContent = hs+'rem';
  document.getElementById('v-radius').textContent = rd+'px';
  document.getElementById('v-pad-v').textContent = pv+'px';
  document.getElementById('v-gap').textContent = gp+'px';
  document.getElementById('v-thumb').textContent = ts+'px';
  document.getElementById('v-thumb-r').textContent = tr+'px';
}

document.getElementById('s-save').onclick = () => {
  const settings = gatherSettings();
  SyncStore.set(SETTINGS_KEY, settings);
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  document.getElementById('s-save').textContent = 'Saved ✓';
  setTimeout(() => document.getElementById('s-save').textContent = 'Save', 1500);
};

// Export config with current design settings baked in
function exportConfig() {
  const settings = gatherSettings();
  // Build a fresh config object with design at the top
  const cfg = {
    design: settings,
    site: SITE,
    socialLinks: SOCIAL_LINKS,
    topLinks: TOP_LINKS,
    resources: RESOURCES,
    eventTypes: EVENT_TYPES,
    filterOrder: FILTER_ORDER,
    venues: VENUES,
    events: EVENTS.map(e => { const {vis, ...rest} = e; return rest; })
  };
  const blob = new Blob([JSON.stringify(cfg, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'site-config.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('s-reset').onclick = () => {
  SyncStore.set(SETTINGS_KEY, {});
  localStorage.removeItem(SETTINGS_KEY);
  location.reload();
};

// SEO — Generate JSON-LD structured data for events
function generateJsonLd() {
  const events = EVENTS.filter(e => e.vis === 'public' && e.date >= new Date().toISOString().slice(0,10));
  const jsonLd = events.map(ev => {
    const venue = VENUES[ev.venue] || {};
    const vName = ev.venueOverride || venue.name || '';
    return {
      "@context": "https://schema.org",
      "@type": "Event",
      "name": ev.title,
      "description": ev.desc || '',
      "startDate": `${ev.date}T${ev.time}:00-07:00`,
      "endDate": `${ev.date}T${ev.endTime}:00-07:00`,
      "eventStatus": "https://schema.org/EventScheduled",
      "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
      "location": {
        "@type": "Place",
        "name": vName,
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Edmonton",
          "addressRegion": "AB",
          "addressCountry": "CA"
        }
      },
      "image": ev.img ? [window.location.origin + '/' + ev.img] : [],
      "organizer": {
        "@type": "Organization",
        "name": "Earth Harmony Sound & Wellness",
        "url": "https://www.earthharmonysoundwellness.com/"
      },
      "offers": {
        "@type": "Offer",
        "price": ev.price,
        "priceCurrency": "CAD",
        "url": ev.booking,
        "availability": "https://schema.org/InStock"
      }
    };
  });
  
  // Also add Organization schema
  const org = {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": SITE.name || "Earth Harmony Sound & Wellness",
    "url": "https://www.earthharmonysoundwellness.com/",
    "description": "Edmonton's premier sound bath, gong immersion, crystal singing bowl, therapeutic drumming & sound healing facilitator training provider. Serving Edmonton, Beaumont, Sherwood Park & area.",
    "areaServed": { "@type": "City", "name": "Edmonton" },
    "sameAs": SOCIAL_LINKS.filter(s => s.icon !== 'mail').map(s => s.url)
  };

  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify([org, ...jsonLd]);
  document.head.appendChild(script);
}

// ============ ANALYTICS ============
function trackPageView() {
  const views = JSON.parse(localStorage.getItem('eh-pageviews') || '[]');
  views.push({
    ts: Date.now(),
    date: new Date().toISOString().slice(0,10),
    ref: document.referrer || 'direct',
    ua: navigator.userAgent,
    embed: new URLSearchParams(window.location.search).get('embed') === '1'
  });
  // Keep last 90 days
  const cutoff = Date.now() - 90*24*60*60*1000;
  const trimmed = views.filter(v => v.ts > cutoff);
  SyncStore.set('eh-pageviews', trimmed);
  localStorage.setItem('eh-pageviews', JSON.stringify(trimmed));
}

function trackClick(eventId, eventTitle, url) {
  const clicks = JSON.parse(localStorage.getItem('eh-clicks') || '[]');
  clicks.push({
    ts: Date.now(),
    date: new Date().toISOString().slice(0,10),
    eventId, eventTitle, url,
    ref: document.referrer || 'direct'
  });
  const cutoff = Date.now() - 90*24*60*60*1000;
  const trimmedClicks = clicks.filter(c => c.ts > cutoff);
  SyncStore.set('eh-clicks', trimmedClicks);
  localStorage.setItem('eh-clicks', JSON.stringify(trimmedClicks));
}
